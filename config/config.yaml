data:
  target: loan_status
  test_size: 0.15
  val_size: 0.15
  random_state: 42

features:
  numerical:
    - person_age
    - person_income
    - person_emp_length
    - loan_amnt
    - loan_int_rate
    - loan_percent_income
    - cb_person_cred_hist_length
  categorical:
    - person_home_ownership
    - loan_intent
    - loan_grade
    - cb_person_default_on_file

paths:
  artifacts_dir: artifacts