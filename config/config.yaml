data:
  target: loan_status
  test_size: 0.15
  val_size: 0.15
  random_state: 42
  raw_path: 'data/raw/credit_risk_dataset.csv'

features:
  numerical:
    - person_age
    - person_income
    - person_emp_length
    - loan_amnt
    - loan_int_rate
    - loan_percent_income
    - cb_person_cred_hist_length
  categorical:
    - person_home_ownership
    - loan_intent
    - loan_grade
    - cb_person_default_on_file

paths:
  artifacts_dir: artifacts

business_logic:
  compliance_threshold: 0.40

tuning_spaces:
  rf:
    n_estimators: [100, 300]
    max_depth: [10, 20]
    min_samples_leaf: [2, 10]
  xgb:
    n_estimators: [100, 300]
    max_depth: [4, 8]
    learning_rate: [0.01, 0.2]
    subsample: [0.7, 1.0]
  lgb:
    n_estimators: [100, 300]
    max_depth: [4, 8]
    num_leaves: [15, 63]
    learning_rate: [0.01, 0.2]