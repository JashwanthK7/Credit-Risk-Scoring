name: Credit Risk MLOps Pipeline

# Trigger this workflow every time code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up the exact Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Verify the Docker image builds successfully without crashing
    - name: Build Production Docker Image
      run: |
        docker build -t credit-risk-api:latest .