name: Credit Risk MLOps Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch Data and Train Champion Model
      run: |
        python src/download_data.py
        python main.py

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: best_model
        path: artifacts/best_model.pkl

  build-deploy-api:
    needs: train-model
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Download Model Artifact
      uses: actions/download-artifact@v4
      with:
        name: best_model
        path: artifacts/

    - name: Build and Push Production Docker Image
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker build -t ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/credit-risk-api:latest